name: Build debug APK

# Runs automatically on every push, and can also be triggered manually
# from the Actions tab (useful from the GitHub mobile app / mobile browser).
on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Installs and caches a Gradle CLI for us, so we don't need a
      # committed gradlew binary (gradle-wrapper.jar) for CI to work.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: freelancing-document-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
